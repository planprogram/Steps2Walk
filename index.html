    // TRADUTOR COMPLETO DE CARACTERES PROIBIDOS DO FIREBASE ( . $ # [ ] / )
    function sanitizeFirebaseKeys(obj) {
        if (obj === null || typeof obj !== 'object') return obj;
        if (Array.isArray(obj)) return obj.map(sanitizeFirebaseKeys);
        const result = {};
        for (const key in obj) {
            if (Object.prototype.hasOwnProperty.call(obj, key)) {
                const safeKey = key
                    .replace(/\./g, '__PNT__')
                    .replace(/\$/g, '__DSR__')
                    .replace(/#/g, '__HSH__')
                    .replace(/\[/g, '__BKT__')
                    .replace(/\]/g, '__BKS__')
                    .replace(/\//g, '__BRR__');
                result[safeKey] = sanitizeFirebaseKeys(obj[key]);
            }
        }
        return result;
    }

    function desanitizeFirebaseKeys(obj) {
        if (obj === null || typeof obj !== 'object') return obj;
        if (Array.isArray(obj)) return obj.map(desanitizeFirebaseKeys);
        const result = {};
        for (const key in obj) {
            if (Object.prototype.hasOwnProperty.call(obj, key)) {
                const originalKey = key
                    .replace(/__PNT__/g, '.')
                    .replace(/__DSR__/g, '$')
                    .replace(/__HSH__/g, '#')
                    .replace(/__BKT__/g, '[')
                    .replace(/__BKS__/g, ']')
                    .replace(/__BRR__/g, '/');
                result[originalKey] = desanitizeFirebaseKeys(obj[key]);
            }
        }
        return result;
    }

    function loadDataFromCloud() {

                instrumentadores = originalData.instrumentadores || [];
                neoorthos = originalData.neoorthos || [];
                scheduleData = originalData.scheduleData || {};
            } else {
                medicos = [...defaultDatabaseState.medicos];
                materiais = JSON.parse(JSON.stringify(defaultDatabaseState.materiais));
                instrumentadores = [...defaultDatabaseState.instrumentadores];
                neoorthos = [...defaultDatabaseState.neoorthos];

    function renderEvento(tabKey) { const container = document.getElementById('scheduleContainer'); const events = scheduleData[tabKey] || []; let html = renderSponsorSummary(); html += `<div class="timeline-header"><h3 style="margin:0; color:var(--secondary);">Programação</h3><button class="btn btn-add" onclick="addTask('${tabKey}')">+ Tarefa</button></div><div class="timeline" id="timeline-${tabKey}">`; if(events.length === 0) html += `<p style="color:#777;">Nenhuma tarefa.</p>`; events.forEach((evt, index) => { html += `<div class="timeline-item" draggable="true" data-tab-key="${tabKey}" data-index="${index}" ondragstart="onDragStart(event, '${tabKey}', ${index})" ondragend="onDragEnd(event)" ondragover="onDragOver(event)" ondragenter="onDragEnter(event, this)" ondragleave="onDragLeave(event, this)" ondrop="onDrop(event, '${tabKey}', ${index})"><div class="timeline-title-row"><div class="drag-handle"><div class="drag-handle-dots">⠿</div></div><div style="flex:1; margin-right:10px;"><label>Horário</label><input type="text" value="${evt.time}" onchange="updateEvento('${tabKey}', ${index}, 'time', this.value)"></div><div style="flex:3; margin-right:10px;"><label>Título</label><input type="text" value="${evt.title}" onchange="updateEvento('${tabKey}', ${index}, 'title', this.value)"></div><div class="move-btns"><button class="move-btn" onclick="moveTask('${tabKey}', ${index}, -1)" ${index === 0 ? 'disabled' : ''}>▲</button><button class="move-btn" onclick="moveTask('${tabKey}', ${index}, 1)" ${index === events.length - 1 ? 'disabled' : ''}>▼</button></div><button class="btn btn-remove" onclick="deleteTask('${tabKey}', ${index})">X</button></div><div style="margin-bottom:8px;"><label>Descrição</label><input type="text" value="${evt.desc}" onchange="updateEvento('${tabKey}', ${index}, 'desc', this.value)"></div><div class="timeline-form"><div><label>Resp:</label><input type="text" value="${evt.resp}" onchange="updateEvento('${tabKey}', ${index}, 'resp', this.value)"></div><div><label>Patrocinador:</label><input type="text" value="${evt.sponsor}" onchange="updateEvento('${tabKey}', ${index}, 'sponsor', this.value)"></div><div><label>Custo (R$):</label><input type="number" step="0.01" value="${evt.price}" onchange="updateEvento('${tabKey}', ${index}, 'price', this.value)"></div></div><div style="margin-top:8px;"><label>Comentários:</label><textarea onchange="updateEvento('${tabKey}', ${index}, 'comments', this.value)">${evt.comments}</textarea></div></div>`; }); html += `</div>`; container.innerHTML = html; }

    function onDragStart(e, tabKey, index) { dragState.tabKey = tabKey; dragState.dragIndex = index; e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', index.toString()); requestAnimationFrame(() => e.target.classList.add('dragging')); } function onDragEnd(e) { e.target.classList.remove('dragging'); document.querySelectorAll('.drag-over-top, .drag-over-bottom').forEach(el => el.classList.remove('drag-over-top', 'drag-over-bottom')); dragState.tabKey = null; dragState.dragIndex = null; } function onDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; } function onDragEnter(e, element) { e.preventDefault(); document.querySelectorAll('.drag-over-top, .drag-over-bottom').forEach(el => el.classList.remove('drag-over-top', 'drag-over-bottom')); const rect = element.getBoundingClientRect(); if (e.clientY < rect.top + rect.height / 2) { element.classList.add('drag-over-top'); element.classList.remove('drag-over-bottom'); } else { element.classList.add('drag-over-bottom'); element.classList.remove('drag-over-top'); } } function onDragLeave(e, element) { if (!element.contains(e.relatedTarget)) element.classList.remove('drag-over-top', 'drag-over-bottom'); } function onDrop(e, tabKey, dropIndex) { e.preventDefault(); document.querySelectorAll('.drag-over-top, .drag-over-bottom').forEach(el => el.classList.remove('drag-over-top', 'drag-over-bottom')); const dragIndex = dragState.dragIndex; if (dragIndex === null || dragIndex === dropIndex || dragState.tabKey !== tabKey) return; const events = scheduleData[tabKey]; const draggedItem = events[dragIndex]; const rect = e.currentTarget.getBoundingClientRect(); const insertBefore = e.clientY < rect.top + rect.height / 2; events.splice(dragIndex, 1); let newIndex = dropIndex; if (dragIndex < dropIndex) newIndex = insertBefore ? dropIndex - 1 : dropIndex; else newIndex = insertBefore ? dropIndex : dropIndex + 1; events.splice(newIndex, 0, draggedItem); renderEvento(tabKey); triggerAutoSave(); }
    function moveTask(tabKey, index, direction) { const events = scheduleData[tabKey]; const newIndex = index + direction; if (newIndex < 0 || newIndex >= events.length) return; const temp = events[index]; events[index] = events[newIndex]; events[newIndex] = temp; renderEvento(tabKey); triggerAutoSave(); }

    function updateEvento(tabKey, index, field, value) { if(field === 'price') value = parseFloat(value) || 0; scheduleData[tabKey][index][field] = value; triggerAutoSave(); }
    function addTask(tabKey) { if (!scheduleData[tabKey]) scheduleData[tabKey] = []; scheduleData[tabKey].push({ time: "-", title: "Nova Tarefa", desc: "", resp: "", sponsor: "", price: 0, comments: "" }); renderEvento(tabKey); triggerAutoSave(); }
    function deleteTask(tabKey, index) { if(confirm("Excluir tarefa?")) { scheduleData[tabKey].splice(index, 1); renderEvento(tabKey); triggerAutoSave(); } }

    function renderCirurgias(tabKey) { const container = document.getElementById('scheduleContainer'); const [hospital, date] = tabKey.split('_'); const hKey = hospital.toLowerCase(); const matOptions = Object.keys(materiais).filter(m => materiais[m][hKey] > 0); const medFilter = medicos.filter(m => { if (regrasMedicos[m] && regrasMedicos[m] !== hospital) return false; return true; }).sort(); let html = `<table><thead><tr><th>Horário</th>${salas.map(s => `<th>${s}</th>`).join('')}</tr></thead><tbody>`; times.forEach((time, timeIdx) => { const separatorClass = timeIdx < times.length - 1 ? 'time-separator' : ''; html += `<tr><td class="time-col ${separatorClass}">${time}</td>`; salas.forEach(sala => { const slot = scheduleData[tabKey][sala][time]; const usedSameTime = getUsedResourcesSameHospitalTime(hospital, date, time, sala); let medOpt = `<option value="">Selecione...</option>`; medFilter.forEach(m => { if (usedSameTime.medicos.includes(m) && slot.medico !== m) return; if (isUsedInOtherHospitalDay('medico', m, hospital, date) && slot.medico !== m) return; medOpt += `<option value="${m}" ${slot.medico === m ? 'selected' : ''}>${m}</option>`; }); let matOpt = `<option value="">Selecione...</option>`; matOptions.forEach(m => { let usedQty = 0; Object.keys(scheduleData).filter(t => t.startsWith(hospital)).forEach(tk => { salas.forEach(s => times.forEach(t => { if(scheduleData[tk][s][t].material === m) usedQty++; })); }); const restante = materiais[m][hKey] - usedQty; if (restante <= 0 && slot.material !== m) return; matOpt += `<option value="${m}" ${slot.material === m ? 'selected' : ''}>${m} (Disp: ${restante})</option>`; }); let instOpt = `<option value="">Selecione...</option>`; instrumentadores.forEach(i => { if (usedSameTime.instrumentadores.includes(i) && slot.instrumentador !== i) return; instOpt += `<option value="${i}" ${slot.instrumentador === i ? 'selected' : ''}>${i}</option>`; }); let neoOpt = `<option value="">Selecione...</option>`; neoorthos.forEach(n => { if (isUsedInOtherHospitalDay('neoortho', n, hospital, date) && slot.neoortho !== n) return; neoOpt += `<option value="${n}" ${slot.neoortho === n ? 'selected' : ''}>${n}</option>`; }); const motorDisabled = (usedSameTime.motores >= maxMotorsPerHospital && !slot.motor) ? 'disabled' : ''; const motorAlert = (motorDisabled === 'disabled') ? `<span class="alert">Esgotado</span>` : ''; html += `<td class="${separatorClass}"><div style="margin-bottom:3px;"><b>Médico:</b><select onchange="updateSlot('${tabKey}','${sala}','${time}','medico',this.value)">${medOpt}</select></div><div style="margin-bottom:3px;"><b>Paciente:</b><input type="text" value="${slot.paciente}" onchange="updateSlot('${tabKey}','${sala}','${time}','paciente',this.value)"></div><div style="margin-bottom:3px;"><b>Material:</b><select onchange="updateSlot('${tabKey}','${sala}','${time}','material',this.value)">${matOpt}</select></div><div style="margin-bottom:3px;"><b>Instrumentador:</b><select onchange="updateSlot('${tabKey}','${sala}','${time}','instrumentador',this.value)">${instOpt}</select></div><div class="checkbox-label" style="margin-bottom:3px;"><b>Motor:</b><input type="checkbox" ${slot.motor ? 'checked' : ''} ${motorDisabled} onchange="updateSlot('${tabKey}','${sala}','${time}','motor',this.checked)"> ${motorAlert}</div><div><b>Neoortho:</b><select onchange="updateSlot('${tabKey}','${sala}','${time}','neoortho',this.value)">${neoOpt}</select></div></td>`; }); html += `</tr>`; }); html += `</tbody></table>`; container.innerHTML = html; }

    function updateSlot(tabKey, sala, time, field, value) { const [hospital, date] = tabKey.split('_'); if (field === "medico" || field === "instrumentador") { const usedSameTime = getUsedResourcesSameHospitalTime(hospital, date, time, sala); const listType = field === "medico" ? "medicos" : "instrumentadores"; if (value && usedSameTime[listType].includes(value)) { alert(`Conflito! ${value} já alocado.`); showTab(tabKey); return; } } if (field === "medico" && value) { if (isUsedInOtherHospitalDay('medico', value, hospital, date)) { alert(`Conflito! ${value} já alocado.`); showTab(tabKey); return; } } if (field === "neoortho" && value) { if (isUsedInOtherHospitalDay('neoortho', value, hospital, date)) { alert(`Conflito! ${value} já alocado.`); showTab(tabKey); return; } } if (field === "motor" && value === true) { const usedSameTime = getUsedResourcesSameHospitalTime(hospital, date, time, sala); if (usedSameTime.motores >= maxMotorsPerHospital) { alert(`Limite atingido!`); showTab(tabKey); return; } } scheduleData[tabKey][sala][time][field] = value; triggerAutoSave(); showTab(tabKey); }

    function toggleMaterialDetails(m) { expandedMaterials[m] = !expandedMaterials[m]; renderMateriais(); }
    function addComponent(matName) { const nameInput = document.getElementById(`comp-name-${matName}`); const qtyInput = document.getElementById(`comp-qty-${matName}`); const compName = nameInput.value.trim(); const compQty = parseInt(qtyInput.value) || 1; if(compName) { if (!materiais[matName].components) materiais[matName].components = {}; materiais[matName].components[compName] = compQty; nameInput.value = ''; qtyInput.value = '1'; renderMateriais(); triggerAutoSave(); } }
    function removeComponent(matName, compName) { delete materiais[matName].components[compName]; renderMateriais(); triggerAutoSave(); }

    function renderMateriais() { const listMat = document.getElementById('listaMateriais'); listMat.innerHTML = Object.keys(materiais).map(m => { const isExpanded = expandedMaterials[m]; let compHtml = ''; if(isExpanded) { compHtml += `<div class="mat-comp-box">`;; const comps = materiais[m].components || {}; if(Object.keys(comps).length === 0) compHtml += `<div style="font-size:11px; color:#777; margin-bottom:5px;">Nenhum componente.</div>`; for (let cName in comps) { compHtml += `<div class="comp-item"><span>- ${cName} (Qtd: ${comps[cName]})</span><button class="btn btn-remove" onclick="removeComponent('${m}', '${cName}')">X</button></div>`; } compHtml += `<div class="comp-form-grid" style="margin-top:5px;"><div><label>Componente</label><input type="text" id="comp-name-${m}"></div><div><label>Qtd</label><input type="number" id="comp-qty-${m}" value="1" min="1"></div><button class="btn btn-add" style="margin-bottom:1px;" onclick="addComponent('${m}')">+</button></div></div>`; } return `<div style="margin-bottom: 8px; border: 1px solid #ddd; padding: 5px; border-radius: 4px; background: white;"><div style="display: grid; grid-template-columns: 1fr 35px 35px auto auto; gap: 4px; align-items: center; font-size: 12px;"><span style="font-weight:bold;">${m}</span><input type="number" class="estoque-input" value="${materiais[m].chc}" onchange="updateMatQty('${m}', 'chc', this.value)"><input type="number" class="estoque-input" value="${materiais[m].chr}" onchange="updateMatQty('${m}', 'chr', this.value)"><button class="btn-outline" onclick="toggleMaterialDetails('${m}')">${isExpanded ? 'Fechar' : 'Compor'}</button><button class="btn btn-remove" onclick="removeMaterial('${m}')">X</button></div>${compHtml}</div>`; }).join(''); }
    function addMaterial() { const input = document.getElementById('newMatNome'); if (input.value && !materiais[input.value]) { materiais[input.value] = {chc: 0, chr: 0, components: {}}; input.value = ''; renderMateriais(); triggerAutoSave(); } }
    function removeMaterial(m) { if(confirm(`Remover material ${m}?`)) { delete materiais[m]; renderMateriais(); triggerAutoSave(); } }
    function updateMatQty(m, hospital, value) { materiais[m][hospital] = parseInt(value) || 0; triggerAutoSave(); }

    function addMedico() { const input = document.getElementById('newMedico'); if (input.value && !medicos.includes(input.value)) { medicos.push(input.value); medicos.sort(); input.value = ''; renderCadastros(); triggerAutoSave(); } }
    function removeMedico(m) { if(confirm(`Remover ${m}?`)) { medicos = medicos.filter(med => med !== m); renderCadastros(); triggerAutoSave(); } }
    function addCad(tipo, inputId) { const input = document.getElementById(inputId); const list = tipo === 'instrumentadores' ? instrumentadores : neoorthos; if (input.value && !list.includes(input.value)) { list.push(input.value); input.value = ''; renderCadastros(); triggerAutoSave(); } }
    function removeCad(tipo, nome) { if(confirm(`Remover ${nome}?`)) { if (tipo === 'instrumentadores') instrumentadores = instrumentadores.filter(i => i !== nome); else neoorthos = neoorthos.filter(n => n !== nome); renderCadastros(); triggerAutoSave(); } }
    function renderCadastros() { document.getElementById('listaMedicos').innerHTML = medicos.map(m => `<div class="list-item"><span>${m} ${regrasMedicos[m] ? '('+regrasMedicos[m]+')' : ''}</span><button class="btn btn-remove" onclick="removeMedico('${m.replace(/'/g, "\\'")}')">X</button></div>`).join(''); document.getElementById('listaInstrumentadores').innerHTML = instrumentadores.map(i => `<div class="list-item"><span>${i}</span><button class="btn btn-remove" onclick="removeCad('instrumentadores','${i.replace(/'/g, "\\'")}')">X</button></div>`).join(''); document.getElementById('listaNeoorthos').innerHTML = neoorthos.map(n => `<div class="list-item"><span>${n}</span><button class="btn btn-remove" onclick="removeCad('neoorthos','${n.replace(/'/g, "\\'")}')">X</button></div>`).join(''); }

    loadDataFromCloud();
</script>
