        .timeline-item { position: relative; margin-bottom: 15px; background: var(--white); padding: 12px; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 4px solid var(--accent); transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s; }

        .timeline-item.drag-over-top { border-top: 3px solid var(--secondary); margin-top: -3px; }
        .timeline-item.drag-over-bottom { border-bottom: 3px solid var(--secondary); margin-bottom: -3px; }
        .timeline-item[draggable="true"] { cursor: grab; }

        .drag-handle { display: flex; flex-direction: column; gap: 1px; margin-right: 6px; cursor: grab; color: #aaa; font-size: 16px; line-height: 1; user-select: none; padding: 0 4px; transition: color 0.2s; }

    function loadDataFromCloud() {
        db.ref('eventData').once('value').then(snapshot => {
            const data = snapshot.val();
            if (data) {
                medicos = data.medicos || defaultDatabaseState.medicos;
                materiais = data.materiais || defaultDatabaseState.materiais;
                instrumentadores = data.instrumentadores || defaultDatabaseState.instrumentadores;
                neoorthos = data.neoorthos || defaultDatabaseState.neoorthos;
                scheduleData = data.scheduleData || defaultDatabaseState.scheduleData;
            } else {
                medicos = [...defaultDatabaseState.medicos];
                materiais = JSON.parse(JSON.stringify(defaultDatabaseState.materiais));
                instrumentadores = [...defaultDatabaseState.instrumentadores];
                neoorthos = [...defaultDatabaseState.neoorthos];
                scheduleData = JSON.parse(JSON.stringify(defaultDatabaseState.scheduleData));
            }

            // Preencher cirurgias faltantes (caso adicione novas salas/horários no futuro)
            ["CHC_08", "CHC_09", "CHR_08", "CHR_09"].forEach(tab => {
                if (!scheduleData[tab]) scheduleData[tab] = {};
                salas.forEach(sala => {
                    if (!scheduleData[tab][sala]) scheduleData[tab][sala] = {};
                    times.forEach(time => {
                        if (!scheduleData[tab][sala][time]) scheduleData[tab][sala][time] = { medico: "", material: "", paciente: "", instrumentador: "", motor: false, neoortho: "" };
                    });
                });
            });

            document.getElementById('loadingScreen').style.display = 'none';
            initUI();
        }).catch(error => {
            console.error("Erro ao carregar:", error);
            document.getElementById('loadingScreen').innerHTML = "Erro ao carregar. Verifique as regras do Firebase.";
        });
    }

    function importData(event) {

        reader.onload = function(e) {

                if (data.medicos) medicos = data.medicos; if (data.materiais) materiais = data.materiais; if (data.instrumentadores) instrumentadores = data.instrumentadores; if (data.neoorthos) neoorthos = data.neoorthos; if (data.scheduleData) scheduleData = data.scheduleData;
                initUI(); alert("Dados importados! Clique em 'Salvar na Nuvem' para atualizar o site.");
            } catch (error) { alert("Erro ao importar o arquivo."); }
        }; reader.readAsText(file); event.target.value = "";
    }

    function getUsedResourcesSameHospitalTime(tabPrefix, date, time, excludeSala) {
        const tabKey = `${tabPrefix}_${date}`; const used = { medicos: [], instrumentadores: [], motores: 0 };
        if (scheduleData[tabKey]) { salas.forEach(sala => { if (sala === excludeSala) return; const slot = scheduleData[tabKey][sala]?.[time]; if (slot) { if (slot.medico) used.medicos.push(slot.medico); if (slot.instrumentador) used.instrumentadores.push(slot.instrumentador); if (slot.motor) used.motores++; } }); }
        return used;
    }
    function isUsedInOtherHospitalDay(resourceType, resourceName, currentHospital, date) {
        const otherHospital = currentHospital === "CHC" ? "CHR" : "CHC"; const otherTabKey = `${otherHospital}_${date}`;
        if (!scheduleData[otherTabKey]) return false;
        for (let sala in scheduleData[otherTabKey]) { for (let time in scheduleData[otherTabKey][sala]) { const slot = scheduleData[otherTabKey][sala][time]; if (resourceType === 'medico' && slot.medico === resourceName) return true; if (resourceType === 'neoortho' && slot.neoortho === resourceName) return true; } }
        return false;
    }
    function formatBRL(value) { return value.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }

    function renderSponsorSummary() {
        const summary = {}; let totalGeral = 0;
        ['EVENT_05', 'EVENT_06', 'EVENT_07'].forEach(day => { if (scheduleData[day]) { scheduleData[day].forEach(task => { const sponsorName = task.sponsor.trim() || "Sem Patrocinador"; const cost = parseFloat(task.price) || 0; if (cost > 0) { if (!summary[sponsorName]) summary[sponsorName] = 0; summary[sponsorName] += cost; totalGeral += cost; } }); } });
        let html = `<div class="summary-box"><div class="summary-title">📊 Resumo de Custos por Patrocinador</div><div class="summary-grid">`;
        const sponsors = Object.keys(summary).sort();
        if (sponsors.length === 0) html += `<p style="color:#777; font-size:12px;">Nenhum custo.</p>`; 
        else sponsors.forEach(spon => html += `<div class="sponsor-card"><div class="sponsor-name">${spon}</div><div class="sponsor-value">${formatBRL(summary[spon])}</div></div>`);
        html += `</div><div class="total-geral">Total Geral: ${formatBRL(totalGeral)}</div></div>`;
        return html;

    function renderReport() {
        const container = document.getElementById('scheduleContainer'); let kitUsage = { CHC: {}, CHR: {} };
        ['CHC_08', 'CHC_09', 'CHR_08', 'CHR_09'].forEach(tab => { const hosp = tab.split('_')[0]; if (!scheduleData[tab]) return; for (let sala in scheduleData[tab]) { for (let time in scheduleData[tab][sala]) { let mat = scheduleData[tab][sala][time].material; if (mat) kitUsage[hosp][mat] = (kitUsage[hosp][mat] || 0) + 1; } } });
        let componentNeeds = {};
        ['CHC', 'CHR'].forEach(hosp => { for (let mat in kitUsage[hosp]) { const qty = kitUsage[hosp][mat]; const comps = materiais[mat]?.components || {}; for (let compName in comps) { const compQtyPerKit = comps[compName]; if (!componentNeeds[compName]) componentNeeds[compName] = { chc: 0, chr: 0 }; componentNeeds[compName][hosp.toLowerCase()] += (compQtyPerKit * qty); } } });

    function renderEvento(tabKey) {

    function onDragStart(e, tabKey, index) { dragState.tabKey = tabKey; dragState.dragIndex = index; e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', index.toString()); requestAnimationFrame(() => e.target.classList.add('dragging')); }
    function onDragEnd(e) { e.target.classList.remove('dragging'); document.querySelectorAll('.drag-over-top, .drag-over-bottom').forEach(el => el.classList.remove('drag-over-top', 'drag-over-bottom')); dragState.tabKey = null; dragState.dragIndex = null; }
    function onDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
    function onDragEnter(e, element) { e.preventDefault(); document.querySelectorAll('.drag-over-top, .drag-over-bottom').forEach(el => el.classList.remove('drag-over-top', 'drag-over-bottom')); const rect = element.getBoundingClientRect(); if (e.clientY < rect.top + rect.height / 2) { element.classList.add('drag-over-top'); element.classList.remove('drag-over-bottom'); } else { element.classList.add('drag-over-bottom'); element.classList.remove('drag-over-top'); } }
    function onDragLeave(e, element) { if (!element.contains(e.relatedTarget)) element.classList.remove('drag-over-top', 'drag-over-bottom'); }
    function onDrop(e, tabKey, dropIndex) { e.preventDefault(); document.querySelectorAll('.drag-over-top, .drag-over-bottom').forEach(el => el.classList.remove('drag-over-top', 'drag-over-bottom')); const dragIndex = dragState.dragIndex; if (dragIndex === null || dragIndex === dropIndex || dragState.tabKey !== tabKey) return; const events = scheduleData[tabKey]; const draggedItem = events[dragIndex]; const rect = e.currentTarget.getBoundingClientRect(); const insertBefore = e.clientY < rect.top + rect.height / 2; events.splice(dragIndex, 1); let newIndex = dropIndex; if (dragIndex < dropIndex) newIndex = insertBefore ? dropIndex - 1 : dropIndex; else newIndex = insertBefore ? dropIndex : dropIndex + 1; events.splice(newIndex, 0, draggedItem); renderEvento(tabKey); }
    function moveTask(tabKey, index, direction) { const events = scheduleData[tabKey]; const newIndex = index + direction; if (newIndex < 0 || newIndex >= events.length) return; const temp = events[index]; events[index] = events[newIndex]; events[newIndex] = temp; renderEvento(tabKey); }

    function updateEvento(tabKey, index, field, value) { if(field === 'price') value = parseFloat(value) || 0; scheduleData[tabKey][index][field] = value; renderEvento(tabKey); }

    function renderCirurgias(tabKey) {

            salas.forEach(sala => {
                const slot = scheduleData[tabKey][sala][time]; const usedSameTime = getUsedResourcesSameHospitalTime(hospital, date, time, sala);
                let medOpt = `<option value="">Selecione...</option>`; medFilter.forEach(m => { if (usedSameTime.medicos.includes(m) && slot.medico !== m) return; if (isUsedInOtherHospitalDay('medico', m, hospital, date) && slot.medico !== m) return; medOpt += `<option value="${m}" ${slot.medico === m ? 'selected' : ''}>${m}</option>`; });
                let matOpt = `<option value="">Selecione...</option>`; matOptions.forEach(m => { let usedQty = 0; Object.keys(scheduleData).filter(t => t.startsWith(hospital)).forEach(tk => { salas.forEach(s => times.forEach(t => { if(scheduleData[tk][s][t].material === m) usedQty++; })); }); const restante = materiais[m][hKey] - usedQty; if (restante <= 0 && slot.material !== m) return; matOpt += `<option value="${m}" ${slot.material === m ? 'selected' : ''}>${m} (Disp: ${restante})</option>`; });
                let instOpt = `<option value="">Selecione...</option>`; instrumentadores.forEach(i => { if (usedSameTime.instrumentadores.includes(i) && slot.instrumentador !== i) return; instOpt += `<option value="${i}" ${slot.instrumentador === i ? 'selected' : ''}>${i}</option>`; });
                let neoOpt = `<option value="">Selecione...</option>`; neoorthos.forEach(n => { if (isUsedInOtherHospitalDay('neoortho', n, hospital, date) && slot.neoortho !== n) return; neoOpt += `<option value="${n}" ${slot.neoortho === n ? 'selected' : ''}>${n}</option>`; });
                const motorDisabled = (usedSameTime.motores >= maxMotorsPerHospital && !slot.motor) ? 'disabled' : ''; const motorAlert = (motorDisabled === 'disabled') ? `<span class="alert">Esgotado</span>` : '';
                html += `<td class="${separatorClass}"><div style="margin-bottom:3px;"><b>Médico:</b><select onchange="updateSlot('${tabKey}','${sala}','${time}','medico',this.value)">${medOpt}</select></div><div style="margin-bottom:3px;"><b>Paciente:</b><input type="text" value="${slot.paciente}" onchange="updateSlot('${tabKey}','${sala}','${time}','paciente',this.value)"></div><div style="margin-bottom:3px;"><b>Material:</b><select onchange="updateSlot('${tabKey}','${sala}','${time}','material',this.value)">${matOpt}</select></div><div style="margin-bottom:3px;"><b>Instrumentador:</b><select onchange="updateSlot('${tabKey}','${sala}','${time}','instrumentador',this.value)">${instOpt}</select></div><div class="checkbox-label" style="margin-bottom:3px;"><b>Motor:</b><input type="checkbox" ${slot.motor ? 'checked' : ''} ${motorDisabled} onchange="updateSlot('${tabKey}','${sala}','${time}','motor',this.checked)"> ${motorAlert}</div><div><b>Neoortho:</b><select onchange="updateSlot('${tabKey}','${sala}','${time}','neoortho',this.value)">${neoOpt}</select></div></td>`;
            }); html += `</tr>`;
        }); html += `</tbody></table>`; container.innerHTML = html;
    }

    function updateSlot(tabKey, sala, time, field, value) {
        const [hospital, date] = tabKey.split('_');
        if (field === "medico" || field === "instrumentador") { const usedSameTime = getUsedResourcesSameHospitalTime(hospital, date, time, sala); const listType = field === "medico" ? "medicos" : "instrumentadores"; if (value && usedSameTime[listType].includes(value)) { alert(`Conflito de Horário! ${value} já está alocado neste horário no ${hospital}.`); showTab(tabKey); return; } }
        if (field === "medico" && value) { if (isUsedInOtherHospitalDay('medico', value, hospital, date)) { alert(`Conflito Diário! ${value} já está alocado no outro hospital neste dia.`); showTab(tabKey); return; } }
        if (field === "neoortho" && value) { if (isUsedInOtherHospitalDay('neoortho', value, hospital, date)) { alert(`Conflito Diário! ${value} já está alocado no outro hospital neste dia.`); showTab(tabKey); return; } }
        if (field === "motor" && value === true) { const usedSameTime = getUsedResourcesSameHospitalTime(hospital, date, time, sala); if (usedSameTime.motores >= maxMotorsPerHospital) { alert(`Limite atingido! Os ${maxMotorsPerHospital} motores do ${hospital} já estão em uso neste horário.`); showTab(tabKey); return; } }
        scheduleData[tabKey][sala][time][field] = value; showTab(tabKey);
    }

    function toggleMaterialDetails(m) { expandedMaterials[m] = !expandedMaterials[m]; renderMateriais(); }
    function addComponent(matName) { const nameInput = document.getElementById(`comp-name-${matName}`); const qtyInput = document.getElementById(`comp-qty-${matName}`); const compName = nameInput.value.trim(); const compQty = parseInt(qtyInput.value) || 1; if(compName) { if (!materiais[matName].components) materiais[matName].components = {}; materiais[matName].components[compName] = compQty; nameInput.value = ''; qtyInput.value = '1'; renderMateriais(); } }
    function removeComponent(matName, compName) { delete materiais[matName].components[compName]; renderMateriais(); }

    function renderMateriais() {
        const listMat = document.getElementById('listaMateriais');
        listMat.innerHTML = Object.keys(materiais).map(m => {
            const isExpanded = expandedMaterials[m]; let compHtml = '';
            if(isExpanded) {
                compHtml += `<div class="mat-comp-box"><div style="font-weight:bold; margin-bottom:5px; font-size:11px;">Composição do Kit:</div>`;
                const comps = materiais[m].components || {}; if(Object.keys(comps).length === 0) compHtml += `<div style="font-size:11px; color:#777; margin-bottom:5px;">Nenhum componente cadastrado.</div>`;
                for (let cName in comps) { compHtml += `<div class="comp-item"><span>- ${cName} (Qtd: ${comps[cName]})</span><button class="btn btn-remove" onclick="removeComponent('${m}', '${cName}')">X</button></div>`; }
                compHtml += `<div class="comp-form-grid" style="margin-top:5px;"><div><label>Componente</label><input type="text" id="comp-name-${m}" placeholder="Ex: Parafuso 7mm"></div><div><label>Qtd no Kit</label><input type="number" id="comp-qty-${m}" value="1" min="1"></div><button class="btn btn-add" style="margin-bottom:1px;" onclick="addComponent('${m}')">+</button></div></div>`;
            }
            return `<div style="margin-bottom: 8px; border: 1px solid #ddd; padding: 5px; border-radius: 4px; background: white;"><div style="display: grid; grid-template-columns: 1fr 35px 35px auto auto; gap: 4px; align-items: center; font-size: 12px;"><span style="font-weight:bold;">${m}</span><input type="number" class="estoque-input" value="${materiais[m].chc}" onchange="updateMatQty('${m}', 'chc', this.value)"><input type="number" class="estoque-input" value="${materiais[m].chr}" onchange="updateMatQty('${m}', 'chr', this.value)"><button class="btn-outline" onclick="toggleMaterialDetails('${m}')">${isExpanded ? 'Fechar' : 'Compor'}</button><button class="btn btn-remove" onclick="removeMaterial('${m}')">X</button></div>${compHtml}</div>`;
        }).join('');
    }
    function addMaterial() { const input = document.getElementById('newMatNome'); if (input.value && !materiais[input.value]) { materiais[input.value] = {chc: 0, chr: 0, components: {}}; input.value = ''; renderMateriais(); renderCirurgiasView(); } }
    function removeMaterial(m) { if(confirm(`Remover material ${m}?`)) { delete materiais[m]; renderMateriais(); renderCirurgiasView(); } }
    function updateMatQty(m, hospital, value) { materiais[m][hospital] = parseInt(value) || 0; renderCirurgiasView(); }

    function addMedico() { const input = document.getElementById('newMedico'); if (input.value && !medicos.includes(input.value)) { medicos.push(input.value); medicos.sort(); input.value = ''; renderCadastros(); renderCirurgiasView(); } }
    function removeMedico(m) { if(confirm(`Remover ${m}?`)) { medicos = medicos.filter(med => med !== m); renderCadastros(); renderCirurgiasView(); } }
    function addCad(tipo, inputId) { const input = document.getElementById(inputId); const list = tipo === 'instrumentadores' ? instrumentadores : neoorthos; if (input.value && !list.includes(input.value)) { list.push(input.value); input.value = ''; renderCadastros(); renderCirurgiasView(); } }
    function removeCad(tipo, nome) { if(confirm(`Remover ${nome}?`)) { if (tipo === 'instrumentadores') { instrumentadores = instrumentadores.filter(i => i !== nome); } else { neoorthos = neoorthos.filter(n => n !== nome); } renderCadastros(); renderCirurgiasView(); } }
    function renderCirurgiasView() { const activeTab = document.querySelector('.tab-btn.active'); if (activeTab) { const tabKey = activeTab.getAttribute('onclick').match(/'([^']+)'/)[1]; if (!tabKey.startsWith("EVENT_") && tabKey !== "REPORT") showTab(tabKey); } }
    function renderCadastros() {
        document.getElementById('listaMedicos').innerHTML = medicos.map(m => `<div class="list-item"><span style="${regrasMedicos[m] ? 'color:var(--secondary);font-weight:bold;' : ''}">${m} ${regrasMedicos[m] ? '('+regrasMedicos[m]+')' : ''}</span><button class="btn btn-remove" onclick="removeMedico('${m.replace(/'/g, "\\'")}')">X</button></div>`).join('');
        document.getElementById('listaInstrumentadores').innerHTML = instrumentadores.map(i => `<div class="list-item"><span>${i}</span><button class="btn btn-remove" onclick="removeCad('instrumentadores','${i.replace(/'/g, "\\'")}')">X</button></div>`).join('');
        document.getElementById('listaNeoorthos').innerHTML = neoorthos.map(n => `<div class="list-item"><span>${n}</span><button class="btn btn-remove" onclick="removeCad('neoorthos','${n.replace(/'/g, "\\'")}')">X</button></div>`).join('');
    }

    loadDataFromCloud();
</script>
</body>
</html>
