    function sanitizeFirebaseKeys(obj) {
        if (obj === null || typeof obj !== 'object') return obj;
        if (Array.isArray(obj)) return obj.map(sanitizeFirebaseKeys);
        const result = {};
        for (const key in obj) {
            if (Object.prototype.hasOwnProperty.call(obj, key)) {

                result[safeKey] = sanitizeFirebaseKeys(obj[key]);
            }
        }
        return result;
    }

    function desanitizeFirebaseKeys(obj) {

    function loadDataFromCloud() {
        db.ref('eventData').once('value').then(snapshot => {
            const data = snapshot.val();
            if (data) {
                const originalData = desanitizeFirebaseKeys(data);
                medicos = originalData.medicos || []; 
                materiais = originalData.materiais || {}; 
                instrumentadores = originalData.instrumentadores || []; 
                neoorthos = originalData.neoorthos || []; 
                scheduleData = originalData.scheduleData || {};
            } else {
                medicos = [...defaultDatabaseState.medicos]; 
                materiais = JSON.parse(JSON.stringify(defaultDatabaseState.materiais)); 
                instrumentadores = [...defaultDatabaseState.instrumentadores]; 
                neoorthos = [...defaultDatabaseState.neoorthos]; 
                scheduleData = JSON.parse(JSON.stringify(defaultDatabaseState.scheduleData));
            }

            ["CHC_08", "CHC_09", "CHR_08", "CHR_09"].forEach(tab => {
                if(!scheduleData[tab]) scheduleData[tab] = {};
                const tabDate = tab.split('_')[1];
                const defaultDate = `2026-10-${tabDate}`;
                salas.forEach(sala => {
                    if(!scheduleData[tab][sala]) {
                        scheduleData[tab][sala] = makeDefaultRoomData(defaultDate);
                    } else if (!scheduleData[tab][sala].surgeries && !scheduleData[tab][sala].date) {
                        const oldSlots = scheduleData[tab][sala];
                        const surgeries = [];
                        for (const timeKey in oldSlots) {
                            if (Object.prototype.hasOwnProperty.call(oldSlots, timeKey)) {
                                const slot = oldSlots[timeKey];
                                if(slot.material && typeof slot.material === 'string' && slot.material !== "") {
                                    slot.materiais = [slot.material];
                                    delete slot.material;
                                }
                                if(!slot.materiais) slot.materiais = [];
                                if(slot.observacao === undefined) slot.observacao = "";
                                if(slot.status === undefined) slot.status = "";
                                if(slot.sponsor === undefined) slot.sponsor = "";
                                surgeries.push({ time: timeKey, ...slot });
                            }
                        }
                        scheduleData[tab][sala] = { date: defaultDate, surgeries: surgeries };
                    } else {
                        if(!scheduleData[tab][sala].date) scheduleData[tab][sala].date = defaultDate;
                        if(!scheduleData[tab][sala].surgeries) scheduleData[tab][sala].surgeries = [];
                    }
                });
            });

            document.getElementById('loadingScreen').style.display = 'none';
            updateSaveStatus('salvo'); 
            initUI();
        }).catch(error => { console.error("Erro CRÍTICO:", error); document.getElementById('loadingScreen').innerHTML = "<h2>Erro ao conectar ao Banco</h2>"; });

        db.ref('patients').on('value', snap => {
            const data = snap.val();
            patientsDB = data || {};
            renderPacientesSidebar();
            const activeTab = document.querySelector('.tab-btn.active');
            if(activeTab) {
                const tabKey = activeTab.getAttribute('onclick').match(/'(.*?)'/)[1];
                if(!tabKey.startsWith('EVENT_') && tabKey !== 'REPORT' && tabKey !== 'AGENDA') {
                    renderCirurgias(tabKey);
                }
            }
        });
    }

    function getRoomDate(tabKey, sala) { return scheduleData[tabKey]?.[sala]?.date || ""; }
    function getUsedResourcesSameHospitalTime(tabKey, sala, surgeryIndex) {
        const used = { medicos: [], instrumentadores: [], motores: 0 };
        if (!scheduleData[tabKey]) return used;
        salas.forEach(s => {
            if (s === sala) return;
            const room = scheduleData[tabKey][s];
            if (!room || !room.surgeries) return;
            room.surgeries.forEach(surgery => {
                if (surgery.medico) used.medicos.push(surgery.medico);
                if (surgery.instrumentador) used.instrumentadores.push(surgery.instrumentador);
                if (surgery.motor) used.motores++;
            });
        });
        return used;
    }
    function isUsedInOtherHospitalDay(resourceType, resourceName, currentHospital, date) {
        const otherHospital = currentHospital === "CHC" ? "CHR" : "CHC";
        const otherTabKey = `${otherHospital}_${date}`;
        if (!scheduleData[otherTabKey]) return false;
        for (let sala in scheduleData[otherTabKey]) {
            const room = scheduleData[otherTabKey][sala];
            if (!room || !room.surgeries) continue;
            for (const surgery of room.surgeries) {
                if (resourceType === 'medico' && surgery.medico === resourceName) return true;
                if (resourceType === 'neoortho' && surgery.neoortho === resourceName) return true;
            }
        }
        return false;
    }

    function renderEvento(tabKey) { const container = document.getElementById('scheduleContainer'); const events = scheduleData[tabKey] || []; let html = renderSponsorSummary(); html += `<div class="timeline-header"><h3 style="margin:0; color:var(--secondary);">Programação</h3><button class="btn btn-add" onclick="addTask('${tabKey}')">+ Tarefa</button></div><div class="timeline" id="timeline-${tabKey}">`; if(events.length === 0) html += `<p style="color:#777;">Nenhuma tarefa.</p>`; events.forEach((evt, index) => { html += `<div class="timeline-item" draggable="true" data-tab-key="${tabKey}" data-index="${index}" ondragstart="onDragStart(event, '${tabKey}', ${index})" ondragend="onDragEnd(event)" ondragover="onDragOver(event)" ondragenter="onDragEnter(event, this)" ondragleave="onDragLeave(event, this)" ondrop="onDrop(event, '${tabKey}', ${index})"><div class="timeline-title-row"><div class="drag-handle"><div class="drag-handle-dots">⠿</div></div><div style="flex:1; margin-right:10px;"><label>Horário</label><input type="text" value="${evt.time}" onchange="updateEvento('${tabKey}', ${index}, 'time', this.value)"></div><div style="flex:3; margin-right:10px;"><label>Título</label><input type="text" value="${evt.title}" onchange="updateEvento('${tabKey}', ${index}, 'title', this.value)"></div><div class="move-btns"><button class="move-btn" onclick="moveTask('${tabKey}', ${index}, -1)" ${index === 0 ? 'disabled' : ''}>▲</button><button class="move-btn" onclick="moveTask('${tabKey}', ${index}, 1)" ${index === events.length - 1 ? 'disabled' : ''}>▼</button></div><button class="btn btn-remove" onclick="deleteTask('${tabKey}', ${index})">X</button></div><div style="margin-bottom:8px;"><label>Descrição</label><input type="text" value="${evt.desc}" onchange="updateEvento('${tabKey}', ${index}, 'desc', this.value)"></div><div class="timeline-form"><div><label>Resp:</label><input type="text" value="${evt.resp}" onchange="updateEvento('${tabKey}', ${index}, 'resp', this.value)"></div><div><label>Status:</label><input type="text" value="${evt.status}" onchange="updateEvento('${tabKey}', ${index}, 'status', this.value)" placeholder="Ex: Confirmado, Pendente..."></div><div><label>Patrocinador:</label><input type="text" value="${evt.sponsor}" onchange="updateEvento('${tabKey}', ${index}, 'sponsor', this.value)"></div><div><label>Custo (R$):</label><input type="number" step="0.01" value="${evt.price}" onchange="updateEvento('${tabKey}', ${index}, 'price', this.value)"></div></div><div style="margin-top:8px;"><label>Comentários:</label><textarea onchange="updateEvento('${tabKey}', ${index}, 'comments', this.value)">${evt.comments}</textarea></div></div>`; }); html += `</div>`; container.innerHTML = html; }

    function onDragStart(e, tabKey, index) { dragState.tabKey = tabKey; dragState.dragIndex = index; e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', index.toString()); requestAnimationFrame(() => e.target.classList.add('dragging')); } function onDragEnd(e) { e.target.classList.remove('dragging'); document.querySelectorAll('.drag-over-top, .drag-over-bottom').forEach(el => el.classList.remove('drag-over-top', 'drag-over-bottom')); dragState.tabKey = null; dragState.dragIndex = null; } function onDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; } function onDragEnter(e, element) { e.preventDefault(); document.querySelectorAll('.drag-over-top, .drag-over-bottom').forEach(el => el.classList.remove('drag-over-top', 'drag-over-bottom')); const rect = element.getBoundingClientRect(); if (e.clientY < rect.top + rect.height / 2) { element.classList.add('drag-over-top'); element.classList.remove('drag-over-bottom'); } else { element.classList.add('drag-over-bottom'); element.classList.remove('drag-over-top'); } } function onDragLeave(e, element) { if (!element.contains(e.relatedTarget)) element.classList.remove('drag-over-top', 'drag-over-bottom'); } function onDrop(e, tabKey, dropIndex) { e.preventDefault(); document.querySelectorAll('.drag-over-top, .drag-over-bottom').forEach(el => el.classList.remove('drag-over-top', 'drag-over-bottom')); const dragIndex = dragState.dragIndex; if (dragIndex === null || dragIndex === dropIndex || dragState.tabKey !== tabKey) return; const events = scheduleData[tabKey]; const draggedItem = events[dragIndex]; const rect = e.currentTarget.getBoundingClientRect(); const insertBefore = e.clientY < rect.top + rect.height / 2; events.splice(dragIndex, 1); let newIndex = dropIndex; if (dragIndex < dropIndex) newIndex = insertBefore ? dropIndex - 1 : dropIndex; else newIndex = insertBefore ? dropIndex : dropIndex + 1; events.splice(newIndex, 0, draggedItem); renderEvento(tabKey); triggerAutoSave(); }
    function moveTask(tabKey, index, direction) { const events = scheduleData[tabKey]; const newIndex = index + direction; if (newIndex < 0 || newIndex >= events.length) return; const temp = events[index]; events[index] = events[newIndex]; events[newIndex] = temp; renderEvento(tabKey); triggerAutoSave(); }
    function updateEvento(tabKey, index, field, value) { if(field === 'price') value = parseFloat(value) || 0; scheduleData[tabKey][index][field] = value; triggerAutoSave(); }
    function addTask(tabKey) { if (!scheduleData[tabKey]) scheduleData[tabKey] = []; scheduleData[tabKey].push({ time: "-", title: "Nova Tarefa", desc: "", resp: "", status: "", sponsor: "", price: 0, comments: "" }); renderEvento(tabKey); triggerAutoSave(); }
    function deleteTask(tabKey, index) { if(confirm("Excluir tarefa?")) { scheduleData[tabKey].splice(index, 1); renderEvento(tabKey); triggerAutoSave(); } }


    function updateSurgeryField(tabKey, sala, surgeryIndex, field, value) {
        scheduleData[tabKey][sala].surgeries[surgeryIndex][field] = value;
        triggerAutoSave();
        renderCirurgias(tabKey);
    }

    function addSurgery(tabKey, sala) {
        if (!scheduleData[tabKey][sala].surgeries) scheduleData[tabKey][sala].surgeries = [];
        scheduleData[tabKey][sala].surgeries.push(makeEmptySurgery());
        triggerAutoSave();
        renderCirurgias(tabKey);
    }

    function removeSurgery(tabKey, sala, surgeryIndex) {
        if (confirm('Excluir cirurgia?')) {
            scheduleData[tabKey][sala].surgeries.splice(surgeryIndex, 1);
            triggerAutoSave();
            renderCirurgias(tabKey);
        }
    }

    function moveSurgery(tabKey, sala, surgeryIndex, direction) {
        const surgeries = scheduleData[tabKey][sala].surgeries;
        const newIndex = surgeryIndex + direction;
        if (newIndex < 0 || newIndex >= surgeries.length) return;
        const temp = surgeries[surgeryIndex];
        surgeries[surgeryIndex] = surgeries[newIndex];
        surgeries[newIndex] = temp;
        triggerAutoSave();
        renderCirurgias(tabKey);
    }

    function addMaterialToSurgery(tabKey, sala, surgeryIndex, selectEl) {
        const matName = selectEl?.value || "";
        if (!matName) return;
        const surgery = scheduleData[tabKey][sala].surgeries[surgeryIndex];
        if (!surgery.materiais) surgery.materiais = [];
        surgery.materiais.push(matName);
        triggerAutoSave();
        renderCirurgias(tabKey);
    }

    function removeMaterialFromSurgery(tabKey, sala, surgeryIndex, matIndex) {
        scheduleData[tabKey][sala].surgeries[surgeryIndex].materiais.splice(matIndex, 1);
        triggerAutoSave();
        renderCirurgias(tabKey);
    }

    function updateRoomDate(tabKey, sala, newDate) {
        scheduleData[tabKey][sala].date = newDate;
        triggerAutoSave();
        renderCirurgias(tabKey);
    }

    function getAllUsedPatients() {
        let used = new Set();
        if (scheduleData) {
            Object.keys(scheduleData).forEach(tab => {
                if (tab.startsWith('CHC') || tab.startsWith('CHR')) {
                    Object.keys(scheduleData[tab]).forEach(sala => {
                        const room = scheduleData[tab][sala];
                        if (room && room.surgeries) {
                            room.surgeries.forEach(surgery => {
                                if (surgery.paciente) used.add(surgery.paciente);
                            });
                        }
                    });
                }
            });
        }
        return used;
    }

    function renderCirurgias(tabKey) {
        const container = document.getElementById('scheduleContainer');
        const [hospital, defaultDate] = tabKey.split('_');
        const hKey = hospital.toLowerCase();
        const medFilter = medicos.filter(m => { if (regrasMedicos[m] && regrasMedicos[m] !== hospital) return false; return true; }).sort();
        const globallyUsedPatients = getAllUsedPatients();

        let html = '';
        salas.forEach(sala => {
            const room = scheduleData[tabKey][sala];
            if (!room) return;
            const roomDate = room.date || ('2026-10-' + defaultDate);
            const surgeries = room.surgeries || [];
            const usedSameHosp = getUsedResourcesSameHospitalTime(tabKey, sala);

            html += '<div class="sala-card">';
            html += '<div class="sala-header">';
            html += '<h3>' + sala + '</h3>';
            html += '<div class="sala-date-field"><label>Data:</label><input type="date" value="' + roomDate + '" onchange="updateRoomDate(\'' + tabKey + '\',\'' + sala + '\',this.value)"></div>';
            html += '<button class="btn btn-add" style="height:28px; font-size:11px;" onclick="addSurgery(\'' + tabKey + '\',\'' + sala + '\')">+ Cirurgia</button>';
            html += '</div>';
            html += '<div class="sala-body">';

            if (surgeries.length === 0) {
                html += '<div class="no-surgeries">Nenhuma cirurgia agendada para esta sala</div>';
            }

            surgeries.forEach((surgery, sIdx) => {
                let medOpt = '<option value="">Selecione...</option>';
                medFilter.forEach(m => {
                    if (usedSameHosp.medicos.includes(m) && surgery.medico !== m) return;
                    if (isUsedInOtherHospitalDay('medico', m, hospital, roomDate.split('-')[2]) && surgery.medico !== m) return;
                    medOpt += '<option value="' + m + '"' + (surgery.medico === m ? ' selected' : '') + '>' + m + '</option>';
                });

                let instOpt = '<option value="">Selecione...</option>';
                instrumentadores.forEach(i => {
                    if (usedSameHosp.instrumentadores.includes(i) && surgery.instrumentador !== i) return;
                    instOpt += '<option value="' + i + '"' + (surgery.instrumentador === i ? ' selected' : '') + '>' + i + '</option>';
                });

                let neoOpt = '<option value="">Selecione...</option>';
                neoorthos.forEach(n => {
                    if (isUsedInOtherHospitalDay('neoortho', n, hospital, roomDate.split('-')[2]) && surgery.neoortho !== n) return;
                    neoOpt += '<option value="' + n + '"' + (surgery.neoortho === n ? ' selected' : '') + '>' + n + '</option>';
                });

                let pacOpt = '<option value="">Selecione...</option>';
                if (patientsDB) {
                    Object.values(patientsDB).forEach(p => {
                        if (p.hospital && p.hospital !== hospital) return;
                        if (globallyUsedPatients.has(p.name) && surgery.paciente !== p.name) return;
                        pacOpt += '<option value="' + p.name + '"' + (surgery.paciente === p.name ? ' selected' : '') + '>' + p.name + '</option>';
                    });
                }

                let currentHospitalMatUsage = {};
                Object.keys(scheduleData).filter(t => t.startsWith(hospital)).forEach(tk => {
                    salas.forEach(s => {
                        const r = scheduleData[tk][s];
                        if (r && r.surgeries) {
                            r.surgeries.forEach(sur => {
                                const mats = sur.materiais || [];
                                mats.forEach(matName => {
                                    currentHospitalMatUsage[matName] = (currentHospitalMatUsage[matName] || 0) + 1;
                                });
                            });
                        }
                    });
                });

                let matOpt = '<option value="">Adicionar Material...</option>';
                Object.keys(materiais).forEach(m => {
                    const stock = materiais[m][hKey];
                    const used = currentHospitalMatUsage[m] || 0;
                    const remaining = stock - used;
                    if (remaining > 0) {
                        matOpt += '<option value="' + m + '">' + m + ' (Disp: ' + remaining + ')</option>';
                    }
                });

                const isDay08or09 = tabKey.endsWith('_08') || tabKey.endsWith('_09');
                const motorDisabled = (!isDay08or09 && usedSameHosp.motores >= maxMotorsPerHospital && !surgery.motor) ? 'disabled' : '';
                const motorAlert = (motorDisabled === 'disabled') ? '<span class="alert">Esgotado</span>' : '';

                let tagsHtml = '';
                (surgery.materiais || []).forEach((m, idx) => {
                    tagsHtml += '<div class="mat-tag" onclick="removeMaterialFromSurgery(\'' + tabKey + '\',\'' + sala + '\',' + sIdx + ',' + idx + ')">' + m + ' <span>✕</span></div>';
                });

                html += '<div class="surgery-item">';
                html += '<button class="btn btn-remove" onclick="removeSurgery(\'' + tabKey + '\',\'' + sala + '\',' + sIdx + ')">✕</button>';
                html += '<div class="surgery-time-row">';
                html += '<div><label>Horário</label><input type="text" value="' + surgery.time + '" placeholder="ex: 07:00 - 10:00" onchange="updateSurgeryField(\'' + tabKey + '\',\'' + sala + '\',' + sIdx + ',\'time\',this.value)"></div>';
                html += '<div class="move-btns" style="margin-top:12px;"><button class="move-btn" onclick="moveSurgery(\'' + tabKey + '\',\'' + sala + '\',' + sIdx + ',-1)"' + (sIdx === 0 ? ' disabled' : '') + '>▲</button><button class="move-btn" onclick="moveSurgery(\'' + tabKey + '\',\'' + sala + '\',' + sIdx + ',1)"' + (sIdx === surgeries.length - 1 ? ' disabled' : '') + '>▼</button></div>';
                html += '</div>';
                html += '<div class="surgery-fields">';
                html += '<div><label>Médico</label><select onchange="updateSurgeryField(\'' + tabKey + '\',\'' + sala + '\',' + sIdx + ',\'medico\',this.value)">' + medOpt + '</select></div>';
                html += '<div><label>Paciente</label><select onchange="updateSurgeryField(\'' + tabKey + '\',\'' + sala + '\',' + sIdx + ',\'paciente\',this.value)">' + pacOpt + '</select></div>';
                html += '<div><label>Instrumentador</label><select onchange="updateSurgeryField(\'' + tabKey + '\',\'' + sala + '\',' + sIdx + ',\'instrumentador\',this.value)">' + instOpt + '</select></div>';
                html += '<div><label>Resp. Neo</label><select onchange="updateSurgeryField(\'' + tabKey + '\',\'' + sala + '\',' + sIdx + ',\'neoortho\',this.value)">' + neoOpt + '</select></div>';
                html += '<div class="full-width"><label>Materiais</label><div style="min-height:20px; margin-bottom:2px;">' + tagsHtml + '</div><div style="display:flex; gap:2px;"><select id="mat-add-' + tabKey + '-' + sala + '-' + sIdx + '" style="flex:1;">' + matOpt + '</select><button class="btn btn-add" style="width:30px;" onclick="addMaterialToSurgery(\'' + tabKey + '\',\'' + sala + '\',' + sIdx + ',document.getElementById(\'mat-add-' + tabKey + '-' + sala + '-' + sIdx + '\'))">+</button></div></div>';
                html += '<div><label>Motor</label><div style="display:flex;align-items:center;gap:5px;"><input type="checkbox" onchange="updateSurgeryField(\'' + tabKey + '\',\'' + sala + '\',' + sIdx + ',\'motor\',this.checked)"' + (surgery.motor ? ' checked' : '') + (motorDisabled ? ' disabled' : '') + '> ' + motorAlert + '</div></div>';
                html += '<div><label>Status</label><input type="text" value="' + (surgery.status || '') + '" placeholder="Status..." onchange="updateSurgeryField(\'' + tabKey + '\',\'' + sala + '\',' + sIdx + ',\'status\',this.value)"></div>';
                html += '<div><label>Patrocinador</label><input type="text" value="' + (surgery.sponsor || '') + '" placeholder="Patrocinador..." onchange="updateSurgeryField(\'' + tabKey + '\',\'' + sala + '\',' + sIdx + ',\'sponsor\',this.value)"></div>';
                html += '<div class="full-width"><label>Observação</label><input type="text" value="' + (surgery.observacao || '') + '" placeholder="Observações..." onchange="updateSurgeryField(\'' + tabKey + '\',\'' + sala + '\',' + sIdx + ',\'observacao\',this.value)"></div>';
                html += '</div></div>';
            });

            html += '</div></div>';
        });

        container.innerHTML = html;
    }

    loadDataFromCloud();

</script>
</body>
</html>
