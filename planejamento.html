        .btn-header.save-btn { border-color: var(--success); color: var(--success); background: rgba(255,255,255,0.1); }
        .btn-header.save-btn:hover { background: var(--success); color: var(--white); }
        .btn-header.import-btn { border-color: var(--accent); color: var(--accent); }
        .btn-header.import-btn:hover { background: var(--accent); color: var(--dark); }
        
        .save-status, .conn-status { font-size: 12px; color: rgba(255,255,255,0.9); display: flex; align-items: center; gap: 5px; }

        if (obj === null || typeof obj !== 'object') return obj;
        if (Array.isArray(obj)) return obj.map(sanitizeFirebaseKeys);

    function loadDataFromCloud() {
        db.ref('eventData').once('value').then(snapshot => {
            const data = snapshot.val();
            if (data) {
                const originalData = desanitizeFirebaseKeys(data);
                medicos = originalData.medicos || []; 
                materiais = originalData.materiais || {}; 
                instrumentadores = originalData.instrumentadores || []; 
                neoorthos = originalData.neoorthos || []; 
                scheduleData = originalData.scheduleData || {};
            } else {
                medicos = [...defaultDatabaseState.medicos]; 
                materiais = JSON.parse(JSON.stringify(defaultDatabaseState.materiais)); 
                instrumentadores = [...defaultDatabaseState.instrumentadores]; 
                neoorthos = [...defaultDatabaseState.neoorthos]; 
                scheduleData = JSON.parse(JSON.stringify(defaultDatabaseState.scheduleData));
            }

            ["CHC_08", "CHC_09", "CHR_08", "CHR_09"].forEach(tab => {
                if(!scheduleData[tab]) scheduleData[tab] = {};
                const tabDate = tab.split('_')[1];
                const defaultDate = `2026-10-${tabDate}`;
                salas.forEach(sala => {
                    if(!scheduleData[tab][sala]) {
                        scheduleData[tab][sala] = makeDefaultRoomData(defaultDate);
                    } else if (!scheduleData[tab][sala].surgeries && !scheduleData[tab][sala].date) {
                        const oldSlots = scheduleData[tab][sala];
                        const surgeries = [];
                        for (const timeKey in oldSlots) {
                            if (Object.prototype.hasOwnProperty.call(oldSlots, timeKey)) {
                                const slot = oldSlots[timeKey];
                                if(slot.material && typeof slot.material === 'string' && slot.material !== "") {
                                    slot.materiais = [slot.material];
                                    delete slot.material;
                                }
                                if(!slot.materiais) slot.materiais = [];
                                if(slot.observacao === undefined) slot.observacao = "";
                                if(slot.status === undefined) slot.status = "";
                                if(slot.sponsor === undefined) slot.sponsor = "";
                                surgeries.push({ time: timeKey, ...slot });
                            }
                        }
                        scheduleData[tab][sala] = { date: defaultDate, surgeries: surgeries };
                    } else {
                        if(!scheduleData[tab][sala].date) scheduleData[tab][sala].date = defaultDate;
                        if(!scheduleData[tab][sala].surgeries) scheduleData[tab][sala].surgeries = [];
                    }
                });
            });

            document.getElementById('loadingScreen').style.display = 'none';
            updateSaveStatus('salvo'); 
            initUI();
        }).catch(error => { console.error("Erro CRÍTICO:", error); document.getElementById('loadingScreen').innerHTML = "<h2>Erro ao conectar ao Banco</h2>"; });

            const data = snap.val();
            patientsDB = data || {};

        });
    }

                if (resourceType === 'medico' && surgery.medico === resourceName) return true;

                        });

    function onDragStart(e, tabKey, index) { dragState.tabKey = tabKey; dragState.dragIndex = index; e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', index.toString()); requestAnimationFrame(() => e.target.classList.add('dragging')); } function onDragEnd(e) { e.target.classList.remove('dragging'); document.querySelectorAll('.drag-over-top, .drag-over-bottom').forEach(el => el.classList.remove('drag-over-top', 'drag-over-bottom')); dragState.tabKey = null; dragState.dragIndex = null; } function onDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; } function onDragEnter(e, element) { e.preventDefault(); document.querySelectorAll('.drag-over-top, .drag-over-bottom').forEach(el => el.classList.remove('drag-over-top', 'drag-over-bottom')); const rect = element.getBoundingClientRect(); if (e.clientY < rect.top + rect.height / 2) { element.classList.add('drag-over-top'); element.classList.remove('drag-over-bottom'); } else { element.classList.add('drag-over-bottom'); element.classList.remove('drag-over-top'); } } function onDragLeave(e, element) { if (!element.contains(e.relatedTarget)) element.classList.remove('drag-over-top', 'drag-over-bottom'); } function onDrop(e, tabKey, dropIndex) { e.preventDefault(); document.querySelectorAll('.drag-over-top, .drag-over-bottom').forEach(el => el.classList.remove('drag-over-top', 'drag-over-bottom')); const dragIndex = dragState.dragIndex; if (dragIndex === null || dragIndex === dropIndex || dragState.tabKey !== tabKey) return; const events = scheduleData[tabKey]; const draggedItem = events[dragIndex]; const rect = e.currentTarget.getBoundingClientRect(); const insertBefore = e.clientY < rect.top + rect.height / 2; events.splice(dragIndex, 1); let newIndex = dropIndex; if (dragIndex < dropIndex) newIndex = insertBefore ? dropIndex - 1 : dropIndex; else newIndex = insertBefore ? dropIndex : dropIndex + 1; events.splice(newIndex, 0, draggedItem); renderEvento(tabKey); triggerAutoSave(); }
    function moveTask(tabKey, index, direction) { const events = scheduleData[tabKey]; const newIndex = index + direction; if (newIndex < 0 || newIndex >= events.length) return; const temp = events[index]; events[index] = events[newIndex]; events[newIndex] = temp; renderEvento(tabKey); triggerAutoSave(); }
    function updateEvento(tabKey, index, field, value) { if(field === 'price') value = parseFloat(value) || 0; scheduleData[tabKey][index][field] = value; triggerAutoSave(); }
    function addTask(tabKey) { if (!scheduleData[tabKey]) scheduleData[tabKey] = []; scheduleData[tabKey].push({ time: "-", title: "Nova Tarefa", desc: "", resp: "", status: "", sponsor: "", price: 0, comments: "" }); renderEvento(tabKey); triggerAutoSave(); }

    function updateSurgeryField(tabKey, sala, surgeryIndex, field, value) {
        scheduleData[tabKey][sala].surgeries[surgeryIndex][field] = value;
        triggerAutoSave();
    }

    function addSurgery(tabKey, sala) {
        if (!scheduleData[tabKey][sala].surgeries) scheduleData[tabKey][sala].surgeries = [];
        scheduleData[tabKey][sala].surgeries.push(makeEmptySurgery());
        triggerAutoSave();
        renderCirurgias(tabKey);
    }

    function removeSurgery(tabKey, sala, surgeryIndex) {
        if (confirm('Excluir cirurgia?')) {
            scheduleData[tabKey][sala].surgeries.splice(surgeryIndex, 1);
            triggerAutoSave();
            renderCirurgias(tabKey);
        }
    }

    function moveSurgery(tabKey, sala, surgeryIndex, direction) {
        const surgeries = scheduleData[tabKey][sala].surgeries;
        const newIndex = surgeryIndex + direction;
        if (newIndex < 0 || newIndex >= surgeries.length) return;
        const temp = surgeries[surgeryIndex];
        surgeries[surgeryIndex] = surgeries[newIndex];
        surgeries[newIndex] = temp;
        triggerAutoSave();
        renderCirurgias(tabKey);
    }

    function addMaterialToSurgery(tabKey, sala, surgeryIndex, selectEl) {
        const matName = selectEl?.value || "";
        if (!matName) return;
        const surgery = scheduleData[tabKey][sala].surgeries[surgeryIndex];
        if (!surgery.materiais) surgery.materiais = [];
        surgery.materiais.push(matName);
        triggerAutoSave();
        renderCirurgias(tabKey);
    }

    function removeMaterialFromSurgery(tabKey, sala, surgeryIndex, matIndex) {
        scheduleData[tabKey][sala].surgeries[surgeryIndex].materiais.splice(matIndex, 1);
        triggerAutoSave();
        renderCirurgias(tabKey);
    }

    function updateRoomDate(tabKey, sala, newDate) {
        scheduleData[tabKey][sala].date = newDate;
        triggerAutoSave();
        renderCirurgias(tabKey);
    }

    function getAllUsedPatients() {
        let used = new Set();
        if (scheduleData) {
            Object.keys(scheduleData).forEach(tab => {
                if (tab.startsWith('CHC') || tab.startsWith('CHR')) {
                    Object.keys(scheduleData[tab]).forEach(sala => {
                        const room = scheduleData[tab][sala];
                        if (room && room.surgeries) {
                            room.surgeries.forEach(surgery => {
                                if (surgery.paciente) used.add(surgery.paciente);
                            });
                        }
                    });
                }
            });
        }
        return used;
    }

    function renderMatrixHTML(tabKey) {
        const [hospital, day] = tabKey.split('_');
        
        // Parse all surgeries and create time slots
        const surgeryMap = {};
        const allTimes = [];
        
        salas.forEach(sala => {
            surgeryMap[sala] = [];
            const room = scheduleData[tabKey]?.[sala];
            if (room?.surgeries) {
                room.surgeries.forEach(surgery => {
                    if (surgery.time) {
                        const times = surgery.time.split(' - ');
                        const startTime = parseTimeToMinutes(times[0]);
                        const endTime = times[1] ? parseTimeToMinutes(times[1]) : startTime + 180; // 3 horas default
                        
                        surgeryMap[sala].push({
                            ...surgery,
                            startTime: startTime,
                            endTime: endTime,
                            displayTime: surgery.time
                        });
                        allTimes.push(startTime);
                        allTimes.push(endTime);
                    }
                });
            }
        });
        
        // Generate time scale
        const uniqueTimes = [...new Set(allTimes)].sort((a, b) => a - b);
        if (uniqueTimes.length === 0) {
            let html = '<div style="margin-bottom:20px; background:#f5f5f5; border-radius:6px; padding:10px; border-left:4px solid var(--accent);">';
            html += '<h4 style="color:var(--accent); margin:0 0 10px 0; font-size:13px;">🏥 ' + hospital + ' - 0' + day + ' de Outubro</h4>';
            html += '<div style="padding:20px; text-align:center; color:#999;">Sem cirurgias agendadas</div>';
            html += '</div>';
            return html;
        }
        
        let html = '<div style="margin-bottom:20px; background:#f5f5f5; border-radius:6px; padding:10px; border-left:4px solid var(--accent);">';
        html += '<h4 style="color:var(--accent); margin:0 0 10px 0; font-size:13px;">🏥 ' + hospital + ' - 0' + day + ' de Outubro</h4>';
        html += '<div style="background:white; border-radius:4px; overflow-x:auto; border:1px solid #ddd;">';
        html += '<div style="display:grid; grid-template-columns:70px repeat(5, 1fr); gap:0; background:white; min-width:800px;">';
        
        // Room headers
        html += '<div style="background:var(--primary); color:white; padding:10px 5px; font-weight:bold; font-size:11px; text-align:center; border-right:1px solid #bbb; border-bottom:1px solid #bbb; position:sticky; left:0; z-index:2;">Horário</div>';
        salas.forEach(sala => {
            html += '<div style="background:var(--primary); color:white; padding:10px 5px; font-weight:bold; font-size:11px; text-align:center; border-right:1px solid #bbb; border-bottom:1px solid #bbb;">'+sala.replace('Sala ','S')+' </div>';
        });
        
        // Time slots - show transitions
        for (let i = 0; i < uniqueTimes.length - 1; i++) {
            const timeStart = uniqueTimes[i];
            const timeEnd = uniqueTimes[i + 1];
            const timeLabel = minutesToTime(timeStart);
            
            html += '<div style="background:var(--primary-light); padding:8px 5px; font-weight:bold; font-size:10px; text-align:center; border-right:1px solid #bbb; border-bottom:1px solid #bbb; min-height:60px; display:flex; align-items:center; justify-content:center; position:sticky; left:0; z-index:1;">'+timeLabel+'</div>';
            
            salas.forEach(sala => {
                const surgeriesInSlot = surgeryMap[sala].filter(s => s.startTime <= timeStart && s.endTime > timeStart);
                
                if (surgeriesInSlot.length === 0) {
                    html += '<div style="background:white; border-right:1px solid #ddd; border-bottom:1px solid #ddd; min-height:60px;"></div>';
                } else if (surgeriesInSlot.length === 1) {
                    const surgery = surgeriesInSlot[0];
                    const medico = escapeHtml((surgery.medico || '-').split(' ').slice(0,2).join(' '));
                    const paciente = escapeHtml((surgery.paciente || '-').substring(0, 15));
                    const motor = surgery.motor ? '⚡' : '';
                    const materiais = (surgery.materiais || []).slice(0, 2).join(', ');
                    const patologia = surgery.patologia ? escapeHtml(surgery.patologia.substring(0, 12)) : '';
                    
                    let tooltipText = '👨‍⚕️ '+escapeHtml(surgery.medico || 'N/A')+'\n🏥 '+paciente+'\n⏱️ '+surgery.displayTime;
                    if (patologia) tooltipText += '\n🔬 '+patologia;
                    if (materiais) tooltipText += '\n📦 '+materiais;
                    
                    html += '<div style="background:var(--accent); padding:5px; font-size:8px; border-right:1px solid #bbb; border-bottom:1px solid #bbb; min-height:60px; overflow-y:auto; border-left:2px solid #c5a003;" title="'+tooltipText+'"><div style="font-weight:bold; margin-bottom:2px; font-size:9px;">'+medico+' '+motor+'</div><div style="opacity:0.9;">'+paciente+'</div>' + (patologia ? '<div style="opacity:0.85; font-size:7px; color:#8B6914; margin-top:1px;">🔬 '+patologia+'</div>' : '') + (materiais ? '<div style="opacity:0.75; font-size:7px; margin-top:1px;">📦 '+materiais+'</div>' : '') + '<div style="opacity:0.7; font-size:7px; margin-top:2px;">'+(surgery.instrumentador ? escapeHtml(surgery.instrumentador.substring(0,10)) : '')+'</div></div>';

                    html += '</div></div>';

            });

        html += '</div></div></div>';

    function parseTimeToMinutes(timeStr) {
        const parts = timeStr.trim().split(':');
        if (parts.length < 2) return 0;
        return parseInt(parts[0]) * 60 + parseInt(parts[1]);
    }

    function minutesToTime(minutes) {
        const hours = Math.floor(minutes / 60);
        const mins = minutes % 60;
        return String(hours).padStart(2, '0') + ':' + String(mins).padStart(2, '0');
    }

                html += '<div class="surgery-fields">';
                html += '<div><label>Médico</label><select onchange="updateSurgeryField(\'' + tabKey + '\',\'' + sala + '\',' + sIdx + ',\'medico\',this.value)">' + medOpt + '</select></div>';
                html += '<div><label>Paciente</label><select onchange="updateSurgeryField(\'' + tabKey + '\',\'' + sala + '\',' + sIdx + ',\'paciente\',this.value)">' + pacOpt + '</select></div>';
                html += '<div><label>Instrumentador</label><select onchange="updateSurgeryField(\'' + tabKey + '\',\'' + sala + '\',' + sIdx + ',\'instrumentador\',this.value)">' + instOpt + '</select></div>';
                html += '<div><label>Resp. Neo</label><select onchange="updateSurgeryField(\'' + tabKey + '\',\'' + sala + '\',' + sIdx + ',\'neoortho\',this.value)">' + neoOpt + '</select></div>';
                html += '<div class="full-width"><label>Materiais</label><div style="min-height:20px; margin-bottom:2px;">' + tagsHtml + '</div><div style="display:flex; gap:2px;"><select id="mat-add-' + tabKey + '-' + sala + '-' + sIdx + '" style="flex:1;">' + matOpt + '</select><button class="btn btn-add" style="width:30px;" onclick="addMaterialToSurgery(\'' + tabKey + '\',\'' + sala + '\',' + sIdx + ',document.getElementById(\'mat-add-' + tabKey + '-' + sala + '-' + sIdx + '\'))">+</button></div></div>';
                html += '<div><label>Motor</label><div style="display:flex;align-items:center;gap:5px;"><input type="checkbox" onchange="updateSurgeryField(\'' + tabKey + '\',\'' + sala + '\',' + sIdx + ',\'motor\',this.checked)"' + (surgery.motor ? ' checked' : '') + (motorDisabled ? ' disabled' : '') + '> ' + motorAlert + '</div></div>';
                html += '<div><label>Status</label><input type="text" value="' + sStatus + '" placeholder="Status..." onchange="updateSurgeryField(\'' + tabKey + '\',\'' + sala + '\',' + sIdx + ',\'status\',this.value)"></div>';
                html += '<div><label>Patrocinador</label><input type="text" value="' + sSponsor + '" placeholder="Patrocinador..." onchange="updateSurgeryField(\'' + tabKey + '\',\'' + sala + '\',' + sIdx + ',\'sponsor\',this.value)"></div>';
                html += '<div><label>Patologia</label><input type="text" value="' + escapeHtml(surgery.patologia || '') + '" placeholder="Patologia..." onchange="updateSurgeryField(\'' + tabKey + '\',\'' + sala + '\',' + sIdx + ',\'patologia\',this.value)"></div>';
                html += '<div class="full-width"><label>Observação</label><input type="text" value="' + sObs + '" placeholder="Observações..." onchange="updateSurgeryField(\'' + tabKey + '\',\'' + sala + '\',' + sIdx + ',\'observacao\',this.value)"></div>';
                html += '</div></div>';
            });

            html += '</div></div>';
        });

        container.innerHTML = html;
    }

    function refreshCirurgiasView() {
        const activeTab = document.querySelector('.tab-btn.active');
        if (activeTab) {
            const onclickAttr = activeTab.getAttribute('onclick');
            if (onclickAttr) {
                const match = onclickAttr.match(/'(.*?)'/);
                if (match) {
                    const tabKey = match[1];
                    if (!tabKey.startsWith('EVENT_') && tabKey !== 'REPORT' && tabKey !== 'AGENDA' && !tabKey.startsWith('MATRIX')) {
                        renderCirurgias(tabKey);
                        return;
                    }
                }
            }
        }
        showTab('CHC_08');
    }

    loadDataFromCloud();

</script>
</body>
</html>
